[project]
name = "syft-verifuscate"
version = "0.1.0"
description = "Verify + obfuscate: prove JAX/Flax inference code only does math (no data theft) while hiding the model architecture"
authors = [{ name = "OpenMined", email = "info@openmined.org" }]
license = { text = "Apache-2.0" }
readme = "README.md"
requires-python = ">=3.10"

# Pure standard-library tool (ast, tokenize, hashlib, fnmatch) — no runtime dependencies.
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/syft_verifuscate"]
