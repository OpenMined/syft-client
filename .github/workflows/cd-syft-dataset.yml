name: CD - Syft Dataset

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: Version bump type
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

concurrency:
  group: 'CD - Syft Dataset'
  cancel-in-progress: false

jobs:
  deploy-syft-dataset:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: |
          pip install packaging
          VERSION=$(python packages/syft-datasets/scripts/bump_version.py ${{ github.event.inputs.bump_type }})
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Bumped syft-dataset to $VERSION"

      - name: Build package
        working-directory: packages/syft-datasets
        run: uv build --out-dir dist

      - name: Publish to PyPI
        working-directory: packages/syft-datasets
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_UNAME_SYFT_DATASET }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASS_SYFT_DATASET }}
        run: uvx twine upload dist/*

      - name: Commit and tag
        run: |
          git add packages/syft-datasets/pyproject.toml
          git commit -m "Release syft-dataset v${{ env.VERSION }}"
          git tag "syft-dataset/v${{ env.VERSION }}"
          git push origin --follow-tags
