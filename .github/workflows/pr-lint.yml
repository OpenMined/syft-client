name: 'PR: Lint & Label'

on:
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: write
  statuses: write

jobs:
  validate-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        id: lint_title
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            ci
            perf
            build
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: >
            The subject "{subject}" must not start with an uppercase letter.
            Use lowercase after the type prefix, e.g. "feat: add retry logic".

      - uses: marocchino/sticky-pull-request-comment@v2
        if: always() && (steps.lint_title.outputs.error_message != null)
        with:
          header: pr-title-lint-error
          message: |
            ### PR title does not follow the required format

            ```
            ${{ steps.lint_title.outputs.error_message }}
            ```

            **Your title must match:** `type: description` or `type(scope): description`

            **Allowed types:** `feat`, `fix`, `docs`, `chore`, `refactor`, `test`, `ci`, `perf`, `build`

            **Examples:**
            - `feat: add retry logic to job approval`
            - `fix(syft-bg): handle timeout in notification sender`
            - `docs: update README`

            See the [PR naming convention](../blob/main/.github/PULL_REQUEST_TEMPLATE.md#pr-naming-convention) for details.

      - uses: marocchino/sticky-pull-request-comment@v2
        if: ${{ steps.lint_title.outputs.error_message == null }}
        with:
          header: pr-title-lint-error
          delete: true

  label:
    name: Auto-label PR
    runs-on: ubuntu-latest
    steps:
      # Apply type label based on PR title prefix
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const typeMap = {
              feat: 'feature',
              fix: 'bugfix',
              docs: 'documentation',
              chore: 'chore',
              refactor: 'refactor',
              test: 'testing',
              ci: 'ci',
              perf: 'performance',
              build: 'build',
            };
            const match = title.match(/^(\w+)(\(.+\))?:/);
            if (match && typeMap[match[1]]) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [typeMap[match[1]]],
              });
            }

      # Apply package labels based on changed files
      - uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
